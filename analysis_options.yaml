# =============================================================================
# [靜態分析配置檔說明]
# 本文件 (analysis_options.yaml) 用於設定 Dart 分析器的行為。
# 透過定義 Lint 規則，確保團隊開發中的程式碼品質、一致性與安全性。
# 良好的規則設定能幫助開發者在編譯前就發現潛在的 Bug 或不佳的寫法。
# =============================================================================

# 激活 Flutter 官方推薦的規則集：包含大多數最佳實踐建議。
include: package:flutter_lints/flutter.yaml

analyzer:
  # 排除自動生成的程式碼或特定檔案，不對其進行分析
  exclude:
    - "build/**"
    - "**/*.g.dart"
    - "**/*.freezed.dart"

linter:
  # [Linter 規則微調]
  # 在此處啟用或禁用特定規則，以符合本專案的開發習慣。
  # 完整的規則清單：https://dart.dev/lints
  rules:
    # 建議在 production 版本保留基本的 log 輸出
    avoid_print: false
    
    # 強制要求類別成員明確標註存取修飾詞或類型，提高可讀性
    always_specify_types: false
    
    # 建議使用單引號以維持程式碼風格統一
    prefer_single_quotes: true
    
    # 禁止定義但不使用變數，避免程式碼冗餘
    unused_local_variable: true
    
    # 確保 await 只用在 Future 類型上
    await_only_futures: true
