<!DOCTYPE html>
<html>
<head>
  <base href="/PWA_GARBAGE/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="PWA Garbage Map Diagnostic">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="垃圾車地圖">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>診斷模式：垃圾車即時地圖</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      background-color: #f0f0f0;
      font-family: sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    #status-box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      width: 320px;
      word-break: break-all;
      z-index: 9999;
      position: relative;
    }
    .error { color: red; font-weight: bold; margin-top: 10px; border: 1px solid red; padding: 5px; }
    .loading { color: orange; }
    .step { margin-bottom: 5px; font-size: 14px; }
  </style>
</head>
<body>
  <div id="status-box">
    <h3>📱 PWA 診斷啟動中</h3>
    <div id="steps">
      <div class="step" id="step1">⏳ 1. 偵測環境中...</div>
      <div class="step" id="step2">⏳ 2. 載入核心 JS...</div>
      <div class="step" id="step3">⏳ 3. 初始化引擎...</div>
      <div class="step" id="step4">⏳ 4. 啟動畫布...</div>
    </div>
    <div id="errors"></div>
  </div>

  <script>
    // 註銷所有舊的 Service Worker 以解決死鎖問題
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(let registration of registrations) {
          registration.unregister();
          console.log('已註銷 Service Worker:', registration);
        }
      });
    }

    function setStep(id, status, text) {
      const el = document.getElementById('step' + id);
      if (el) el.innerText = status + ' ' + (text || el.innerText.substring(5));
      console.log('Step ' + id + ': ' + status + ' ' + text);
    }

    function addError(e) {
      const div = document.createElement('div');
      div.className = 'error';
      div.innerText = '❌ 錯誤：' + e;
      document.getElementById('errors').appendChild(div);
      console.error('Diagnostic Error:', e);
    }

    window.onerror = function(m, s, l, c, e) { 
      addError(m + ' at ' + l + ':' + c); 
      setStep(3, '❌', '引擎初始化崩潰');
    };
    window.onunhandledrejection = function(e) { 
      addError('Async: ' + e.reason); 
      setStep(3, '❌', '非同步初始化失敗');
    };

    setStep(1, '✅', '環境偵測正常');
  </script>
  
  <script src="flutter_bootstrap.js" async></script>
  
  <script>
    // 透過監聽特定變數或狀態來回報進度
    window.addEventListener('load', function() {
      setStep(2, '✅', 'JS 資源已下載');
      
      // 監聽引擎初始化進度
      const _originalInitializeEngine = window._flutter && window._flutter.loader && window._flutter.loader.load;
      if (window._flutter && window._flutter.loader) {
        console.log('Flutter loader detected');
      }
    });

    // 強制設定 HTML 渲染器以增加 iPhone 相容性
    window.flutterWebRenderer = "html";
  </script>
</body>
</html>
