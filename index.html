<!DOCTYPE html>
<html>
<head>
  <base href="/PWA_GARBAGE/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="垃圾車地圖">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <title>台灣垃圾車即時地圖</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { background: #FFD700; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
    #loader { text-align: center; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 80%; }
    .error-box { color: red; text-align: left; font-size: 12px; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; display: none; }
  </style>
</head>
<body>
  <div id="loader">
    <h2 id="status">正在啟動地圖...</h2>
    <p id="sub-status">正在載入核心引擎</p>
    <div id="error-display" class="error-box"></div>
  </div>

  <script src="flutter.js" defer></script>
  <script>
    const status = document.getElementById('status');
    const subStatus = document.getElementById('sub-status');
    const errorDisplay = document.getElementById('error-display');

    function reportError(err) {
      errorDisplay.style.display = 'block';
      errorDisplay.innerText = '❌ 錯誤回報：' + err;
      status.innerText = '啟動失敗';
    }

    window.onerror = (m, s, l) => reportError(m + " (" + l + ")");

    window.addEventListener('load', function() {
      subStatus.innerText = '正在初始化渲染引擎...';
      
      _flutter.loader.load({
        serviceWorker: null, // 完全禁用 Service Worker 避免快取衝突
        onEntrypointLoaded: function(engineInitializer) {
          subStatus.innerText = '正在建立畫布...';
          engineInitializer.initializeEngine({
            renderer: "html", // 強制使用 HTML 模式提高相容性
            useColorEmoji: true
          }).then(function(appRunner) {
            subStatus.innerText = '即將進入地圖...';
            return appRunner.runApp();
          }).catch(reportError);
        }
      });
    });
  </script>
</body>
</html>
